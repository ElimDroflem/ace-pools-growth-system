name: Refresh Ace Pools leads

on:
  schedule:
    - cron: "17 6 * * *"
      timezone: "Europe/London"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ace-daily-leads
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh territory and discover new signals
        run: python scripts/update_leads.py
      - name: Commit changed lead data
        run: |
          git config user.name "Ace Pools Lead Engine"
          git config user.email "actions@users.noreply.github.com"
          git add data/leads.json data/geocode_cache.json
          git diff --cached --quiet || git commit -m "Daily lead refresh"
          git push
