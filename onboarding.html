<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Onboarding | Ace Pools</title><link rel="stylesheet" href="assets/styles.css"></head><body><div class="shell"><header class="simple-nav no-print"><a class="brand" href="dashboard.html">ACE POOLS</a><nav><a href="lead-map.html">Find leads</a><a href="dashboard.html">Pipeline</a><a class="active" href="customers.html">Customers</a></nav></header><main><section class="dashboard-header simple-heading"><div><div class="eyebrow">CUSTOMER ONBOARDING</div><h1>Set the customer up once.</h1><p class="muted">Complete this before the first PoolCare visit.</p></div></section><form id="onboardingForm" class="tool lifecycle-form"><div class="form-grid"><div class="field"><label for="onboardName">Customer</label><input id="onboardName" required></div><div class="field"><label for="onboardProperty">Property</label><input id="onboardProperty"></div><div class="field"><label for="onboardPhone">Phone</label><input id="onboardPhone"></div><div class="field"><label for="onboardEmail">Email</label><input id="onboardEmail" type="email"></div><div class="field"><label for="onboardPlan">Plan</label><select id="onboardPlan"><option>PoolCare Complete</option><option>PoolCare Concierge</option><option>Upgrade project only</option></select></div><div class="field"><label for="onboardPrice">Annual value</label><input id="onboardPrice" type="number"></div><div class="field"><label for="onboardDay">Regular visit day</label><input id="onboardDay" placeholder="e.g. Tuesday morning"></div><div class="field"><label for="onboardStart">First visit</label><input id="onboardStart" type="date"></div></div><h2>Four things to confirm</h2><div class="onboarding-checks"><label><input id="checkAgreement" type="checkbox"> Agreement and annual price confirmed</label><label><input id="checkPayment" type="checkbox"> Payment method arranged</label><label><input id="checkAccess" type="checkbox"> Property access and emergency contact recorded</label><label><input id="checkBaseline" type="checkbox"> Equipment, readings, faults and photographs recorded</label></div><div class="form-grid"><div class="field full"><label for="accessNotes">Access, alarm, pets and emergency contact</label><textarea id="accessNotes"></textarea></div><div class="field full"><label for="equipmentNotes">Pool and equipment baseline</label><textarea id="equipmentNotes" placeholder="Pool type, pump, filter, heating, treatment, cover and known age"></textarea></div><div class="field full"><label for="faultNotes">Existing faults, exclusions and first priorities</label><textarea id="faultNotes"></textarea></div><div class="field"><label for="preferredContact">Preferred contact method</label><select id="preferredContact"><option>Phone</option><option>WhatsApp</option><option>Email</option></select></div><div class="field"><label for="renewalDate">Renewal date</label><input id="renewalDate" type="date"></div></div><div class="tool-actions"><a class="btn" href="customers.html">Cancel</a><button class="btn btn-primary">Finish onboarding</button></div><p id="onboardingStatus" class="muted"></p></form></main></div><script src="assets/onboarding.js?v=1"></script><script type="module" src="assets/cloud-sync.js"></script></body></html>
