<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pool Review | Ace Pools</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
      .review-row {
        display: grid;
        grid-template-columns: 190px 120px 1fr;
        gap: 10px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      @media (max-width: 700px) {
        .review-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="simple-nav">
        <a class="brand" href="best-leads.html">ACE POOLS</a>
        <nav>
          <a href="best-leads.html">Find leads</a
          ><a class="active" href="dashboard.html">Follow-ups</a
          ><a href="customers.html">Customers</a>
        </nav>
      </header>
      <main>
        <section class="dashboard-header simple-heading">
          <div>
            <div class="eyebrow">ON-SITE REVIEW</div>
            <h1>Inspect once. Create the proposal automatically.</h1>
            <p class="muted">
              Record the three things the customer needs to understand.
            </p>
          </div>
        </section>
        <form id="reviewForm" class="tool">
          <div class="form-grid">
            <div class="field">
              <label for="customer">Customer or property</label
              ><input id="customer" required />
            </div>
            <div class="field">
              <label for="postcode">Postcode</label><input id="postcode" />
            </div>
            <div class="field">
              <label for="reviewDate">Date</label
              ><input id="reviewDate" type="date" required />
            </div>
            <div class="field">
              <label for="poolType">Pool type and age</label
              ><input id="poolType" />
            </div>
          </div>
          <h2>What did you find?</h2>
          <div id="assessment"></div>
          <h2>What should happen next?</h2>
          <div class="form-grid">
            <div class="field full">
              <label for="immediate"
                >1. Immediate safety or reliability work</label
              ><textarea id="immediate"></textarea>
            </div>
            <div class="field full">
              <label for="preventative">2. Preventative work</label
              ><textarea id="preventative"></textarea>
            </div>
            <div class="field full">
              <label for="saving">3. Running-cost saving</label
              ><textarea id="saving"></textarea>
            </div>
            <div class="field">
              <label for="plan">Recommend</label
              ><select id="plan">
                <option>PoolCare Complete</option>
                <option>PoolCare Concierge</option>
                <option>Upgrade project only</option>
              </select>
            </div>
            <div class="field">
              <label for="photos">Evidence note</label
              ><input id="photos" placeholder="Photos taken, model numbers" />
            </div>
          </div>
          <div class="tool-actions">
            <a class="btn" href="dashboard.html">Cancel</a
            ><button class="btn btn-primary">Create proposal</button>
          </div>
        </form>
      </main>
    </div>
    <script src="assets/review.js?v=2"></script>
  </body>
</html>
