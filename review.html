<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pool Review | Ace Pools</title><link rel="stylesheet" href="assets/styles.css"><style>.review-row{display:grid;grid-template-columns:220px 130px 1fr;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}@media(max-width:700px){.review-row{grid-template-columns:1fr}.review-row strong{margin-top:10px}}</style></head><body><div class="shell"><header class="topbar"><div class="brand">ACE POOLS / REVIEW</div><nav><a href="today.html">Today</a><a href="dashboard.html">Pipeline</a></nav></header><main><section class="dashboard-header"><div><div class="eyebrow">Evidence-led sale</div><h1>Pool Safety & Efficiency Review</h1><p class="muted">Complete this once. It becomes the customer proposal.</p></div></section><form id="reviewForm" class="tool"><div class="form-grid"><div class="field"><label for="customer">Customer / property</label><input id="customer" required></div><div class="field"><label for="postcode">Postcode</label><input id="postcode"></div><div class="field"><label for="reviewDate">Date</label><input id="reviewDate" type="date" required></div><div class="field"><label for="poolType">Pool type / approximate age</label><input id="poolType"></div></div><h2>Assessment</h2><div id="assessment"></div><h2>Recommendation</h2><div class="form-grid"><div class="field full"><label for="immediate">Immediate safety / reliability priority</label><textarea id="immediate"></textarea></div><div class="field full"><label for="preventative">Preventative work</label><textarea id="preventative"></textarea></div><div class="field full"><label for="saving">Running-cost opportunity</label><textarea id="saving"></textarea></div><div class="field"><label for="plan">Recommended plan</label><select id="plan"><option>PoolCare Complete</option><option>PoolCare Essential</option><option>PoolCare Concierge</option><option>Upgrade project only</option></select></div><div class="field"><label for="photos">Photo / evidence note</label><input id="photos" placeholder="e.g. pump plate, cover, plant room"></div></div><div class="tool-actions"><a class="btn" href="dashboard.html">Cancel</a><button class="btn btn-primary">Create customer proposal</button></div></form></main></div><script src="assets/review.js"></script></body></html>
